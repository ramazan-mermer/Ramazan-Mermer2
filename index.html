<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramazan Mermer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f2f2f2}

/* HEADER */
header{
  background:#2c2c2c;
  color:#fff;
  padding:12px;
  text-align:center;
  position:sticky;
  top:0;
  cursor:pointer;
  z-index:10;
}

/* FLOAT BUTTONS */
#callBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  background:#ff3b3b;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:pulse 1.8s infinite;
  z-index:50;
}
#callBtn img{width:28px}

#mapBtn{
  position:fixed;
  bottom:20px;
  right:95px;
  width:65px;
  height:65px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  background:#2c2c2c;
  display:flex;
  align-items:center;
  justify-content:center;
  animation:pulseMap 1.8s infinite;
  z-index:50;
}
#mapBtn img{width:26px}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,59,59,0.6);}
  70%{box-shadow:0 0 0 15px rgba(255,59,59,0);}
  100%{box-shadow:0 0 0 0 rgba(255,59,59,0);}
}

@keyframes pulseMap{
  0%{box-shadow:0 0 0 0 rgba(0,0,0,0.4);}
  70%{box-shadow:0 0 0 15px rgba(0,0,0,0);}
  100%{box-shadow:0 0 0 0 rgba(0,0,0,0);}
}

/* LIST */
.list{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
}

.card-info{padding:10px}

.name-price{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:13px;
}

.wp-item{
  background:#25D366;
  color:#fff;
  border:none;
  width:100%;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>Ramazan Mermer</header>

<div class="list" id="list"></div>

<!-- FLOAT BUTTONS -->
<button id="mapBtn" onclick="openMap()">
  <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
</button>

<button id="callBtn" onclick="callPhone()">
  <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png">
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyD6TKF0EJbmJtl9jVNKS-Lz24weFjYKGeE",
  databaseURL:"https://ramazan-mermer-default-rtdb.europe-west1.firebasedatabase.app"
});

const db = getDatabase(app);
const listEl = document.getElementById("list");

let modelsData = [];
let activeCat = "Tümü";

onValue(ref(db,"models"), snap => {
  const data = snap.val();
  if(!data){modelsData=[];render();return;}
  modelsData = Object.entries(data).map(([id,item]) => ({ id, ...item }));
  render();
});

function render(){
  listEl.innerHTML = "";

  let filtered = [...modelsData];

  // kategori filtresi
  if(activeCat !== "Tümü"){
    filtered = filtered.filter(i => i.category === activeCat);
  }

  // ⭐ KATEGORİYE GÖRE SIRALAMA
  filtered.sort((a,b) => {
    const aOrder = a.orderMap?.[activeCat] ?? 9999;
    const bOrder = b.orderMap?.[activeCat] ?? 9999;
    return aOrder - bOrder;
  });

  filtered.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${item.img}">
      <div class="card-info">
        <div class="name-price">
          <div>${item.name}</div>
          <div>${item.price}₺</div>
        </div>
        <button class="wp-item" onclick="sendWhatsApp('${item.name}')">
          WhatsApp'tan sor
        </button>
      </div>
    `;

    listEl.appendChild(div);
  });
}

// 📍 HARİTA
window.openMap = () => {
  window.open("https://www.google.com/maps?q=41.21827697753906,32.710208892822266", "_blank");
};

// 📞 TELEFON
window.callPhone = () => {
  window.location.href = "tel:+905423189711";
};

// 💬 WHATSAPP
window.sendWhatsApp = (name) => {
  const msg = `Merhaba, ${name} modeli hakkında bilgi almak istiyorum.`;
  window.open("https://wa.me/905423189711?text=" + encodeURIComponent(msg));
};
</script>

</body>
</html>
