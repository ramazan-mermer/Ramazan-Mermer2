<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramazan Mermer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f2f2f2}

header{
  background:#2c2c2c;
  color:#fff;
  padding:10px;
  text-align:center;
  position:sticky;
  top:0;
}

.header-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

header img{height:45px}

.section-title{
  padding:15px;
  font-weight:bold;
  font-size:18px;
}

.list{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding-bottom:120px;
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
}

.card-info{
  padding:10px;
}

.name-price{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

/* WhatsApp buton (kart içi) */
.wp-item{
  background:#25D366;
  color:#fff;
  border:none;
  width:100%;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

/* sabit buton */
#wpBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:#fff;
  border:none;
  border-radius:50%;
  width:55px;
  height:55px;
  cursor:pointer;
}

#wpBtn img{
  width:30px;
}

/* viewer */
#viewer{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

#viewer img{
  max-width:95%;
  max-height:95%;
}
</style>
</head>

<body>

<header>
  <div class="header-content">
    <img src="logo.png">
    <h2>Ramazan Mermer</h2>
  </div>
</header>

<div class="section-title">Mezar Modellerimiz:</div>

<div class="list" id="list"></div>

<!-- sabit whatsapp -->
<button id="wpBtn" onclick="goWhatsApp()">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</button>

<!-- foto viewer -->
<div id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyD6TKF0EJbmJtl9jVNKS-Lz24weFjYKGeE",
authDomain:"ramazan-mermer.firebaseapp.com",
databaseURL:"https://ramazan-mermer-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"ramazan-mermer"
});

const db=getDatabase(app);
const list=document.getElementById("list");

/* RENDER */
onValue(ref(db,"models"),snap=>{
list.innerHTML="";
const data=snap.val();
if(!data) return;

Object.entries(data).forEach(([id,item])=>{
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${item.img}" onclick="openViewer('${item.img}')">

<div class="card-info">
  <div class="name-price">
    <div>${item.name}</div>
    <div>${item.price}₺</div>
  </div>

  <button class="wp-item" onclick="sendWhatsApp(event,'${item.name}')">
    WhatsApp'tan sor
  </button>
</div>
`;

list.appendChild(div);
});
});

/* foto */
window.openViewer=(src)=>{
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src=src;
};

window.closeViewer=()=>{
document.getElementById("viewer").style.display="none";
};

/* ürün whatsapp */
window.sendWhatsApp=(e,name)=>{
e.stopPropagation();
const msg = `Merhaba, ${name} modeli hakkında bilgi almak istiyorum.`;
window.open("https://wa.me/905423189711?text="+encodeURIComponent(msg),"_blank");
};

/* genel whatsapp */
window.goWhatsApp=()=>{
window.open("https://wa.me/905423189711","_blank");
};
</script>

</body>
</html>
