<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezar Kataloğu</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f2f2f2; font-family: Arial, sans-serif; color: #222; }

header {
  background: #2c2c2c; color: #fff;
  text-align: center; padding: 16px;
  font-size: 1rem; font-weight: bold; letter-spacing: 1px;
  position: sticky; top: 0; z-index: 10;
}

#adminBar {
  display: none; background: #fff3cd;
  border-bottom: 1px solid #ffc107;
  padding: 8px; text-align: center;
  font-size: 0.78rem; color: #856404;
}

.list { padding: 12px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 80px; }

.card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

.card img {
  width: 100%; aspect-ratio: 4/3;
  object-fit: cover; display: block;
}
.card-info {
  padding: 12px 14px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.card-left { display: flex; flex-direction: column; gap: 3px; }
.card-num { font-size: 0.7rem; color: #888; }
.card-name { font-size: 0.95rem; font-weight: bold; }
.card-price {
  font-size: 1rem; font-weight: bold; color: #fff;
  background: #2c2c2c; padding: 7px 14px;
  border-radius: 6px; white-space: nowrap;
}

/* Admin düzenle butonu */
.edit-row { display: none; padding: 0 14px 12px; gap: 8px; }
.edit-row.show { display: flex; }
.ebtn {
  flex: 1; padding: 9px; border: none; border-radius: 6px;
  font-size: 0.82rem; font-weight: bold; cursor: pointer;
  background: #e8e8e8; color: #333;
}

/* FAB butonlar */
#lockBtn {
  position: fixed; bottom: 18px; right: 16px; z-index: 99;
  background: #2c2c2c; color: #fff; border: none;
  border-radius: 50px; padding: 12px 20px;
  font-size: 0.82rem; cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.3);
}
#addBtn {
  display: none; position: fixed; bottom: 18px; left: 16px; z-index: 99;
  background: #2a6e2a; color: #fff; border: none;
  border-radius: 50px; padding: 12px 20px;
  font-size: 0.82rem; cursor: pointer;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}

/* Sheet modal */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: flex-end; justify-content: center; }
.overlay.open { display: flex; }
.sheet {
  background: #fff; border-radius: 16px 16px 0 0;
  padding: 1.4rem 1.4rem 2.8rem;
  width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
}
.sheet h3 { font-size: 1rem; margin-bottom: 1rem; color: #2c2c2c; }
.fg { margin-bottom: 0.85rem; }
.fg label { display: block; font-size: 0.72rem; color: #888; margin-bottom: 4px; }
.fg input, .fg textarea {
  width: 100%; border: 1px solid #ddd; border-radius: 7px;
  padding: 9px 11px; font-size: 0.88rem; font-family: inherit; outline: none;
}
.fg input:focus { border-color: #2c2c2c; }
.sbtns { display: flex; gap: 9px; margin-top: 1rem; }
.sbtn { flex: 1; padding: 11px; border-radius: 9px; border: none; font-size: 0.88rem; font-weight: bold; cursor: pointer; }
.sbtn-save { background: #2c2c2c; color: #fff; }
.sbtn-cancel { background: #eee; color: #555; }
.del-link { display: block; text-align: center; margin-top: 14px; color: #c00; font-size: 0.8rem; cursor: pointer; }

/* Şifre modal */
#passModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; align-items: center; justify-content: center; }
#passModal.open { display: flex; }
.pbox { background: #fff; border-radius: 14px; padding: 1.6rem; width: 280px; text-align: center; }
.pbox h3 { font-size: 0.95rem; margin-bottom: 1rem; }
.pbox input {
  width: 100%; text-align: center; border: 1px solid #ddd; border-radius: 8px;
  padding: 10px; font-size: 1.2rem; letter-spacing: 6px; outline: none; margin-bottom: 6px;
}
.pbox input:focus { border-color: #2c2c2c; }
.perr { color: #c00; font-size: 0.75rem; min-height: 16px; margin-bottom: 8px; }
.pbtns { display: flex; gap: 8px; }
.pbtns button { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 0.85rem; font-weight: bold; cursor: pointer; }
.pbtn-ok { background: #2c2c2c; color: #fff; }
.pbtn-cancel { background: #eee; color: #555; }
</style>
</head>
<body>

<div id="adminBar">✏️ Düzenleme modu açık — model ekleyebilir, düzenleyebilir, silebilirsiniz</div>
<header>MEZAR KATALOGİ</header>
<div class="list" id="list"></div>

<button id="lockBtn" onclick="openPass()">🔒 Yönetici</button>
<button id="addBtn" onclick="openAdd()">+ Yeni Model</button>

<!-- Düzenle / Ekle -->
<div class="overlay" id="editOverlay">
  <div class="sheet">
    <h3 id="sheetTitle">Model Düzenle</h3>
    <div class="fg"><label>Model Adı</label><input type="text" id="f-name" placeholder="ör. Klasik Mermer Mezar"></div>
    <div class="fg"><label>Fiyat (₺)</label><input type="number" id="f-price" min="0" placeholder="ör. 20000"></div>
    <div class="fg"><label>Fotoğraf Linki <small style="color:#aaa">(i.ibb.co/... formatında)</small></label><input type="text" id="f-img" placeholder="https://i.ibb.co/..."></div>
    <div class="sbtns">
      <button class="sbtn sbtn-cancel" onclick="closeEdit()">İptal</button>
      <button class="sbtn sbtn-save" onclick="saveModel()">Kaydet</button>
    </div>
    <span class="del-link" id="delLink" onclick="deleteModel()">Bu modeli sil</span>
  </div>
</div>

<!-- Şifre -->
<div id="passModal">
  <div class="pbox">
    <h3>🔒 Yönetici Girişi</h3>
    <input type="password" id="passIn" placeholder="••••" maxlength="20" onkeydown="if(event.key==='Enter')checkPass()">
    <div class="perr" id="passErr"></div>
    <div class="pbtns">
      <button class="pbtn-cancel" onclick="closePass()">İptal</button>
      <button class="pbtn-ok" onclick="checkPass()">Giriş</button>
    </div>
    <p style="font-size:0.66rem;color:#bbb;margin-top:12px">Şifre: 1234</p>
  </div>
</div>

<script>
// ── Başlangıç modelleri ──
const INITIAL = [
  { id: 1, name: "Model 1", price: 20000, img: "https://i.ibb.co/Y7pqTf8f/RMZ.jpg" },
  { id: 2, name: "Model 2", price: 20000, img: "https://i.ibb.co/F45Nj8h4/RMZ2.jpg" },
  { id: 3, name: "Model 3", price: 20000, img: "https://i.ibb.co/27ySwb6L/RMZ3.jpg" },
];

const DK = 'mz_v4';
let admin = false;
let editId = null;

function get() {
  try {
    const d = localStorage.getItem(DK);
    if (d) return JSON.parse(d);
  } catch(e) {}
  sv(INITIAL);
  return JSON.parse(JSON.stringify(INITIAL));
}
function sv(a) { localStorage.setItem(DK, JSON.stringify(a)); }
function fmt(n) { return Number(n).toLocaleString('tr-TR') + ' ₺'; }

function render() {
  const models = get();
  document.getElementById('list').innerHTML = models.map((m, i) => `
    <div class="card">
      <img src="${m.img}" alt="${m.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22><rect fill=%22%23e0dcd7%22 width=%22400%22 height=%22300%22/><text x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2248%22>🪨</text></svg>'">
      <div class="card-info">
        <div class="card-left">
          <span class="card-num">Model ${i + 1}</span>
          <span class="card-name">${m.name}</span>
        </div>
        <span class="card-price">${fmt(m.price)}</span>
      </div>
      <div class="edit-row ${admin ? 'show' : ''}">
        <button class="ebtn" onclick="openEdit(${m.id})">✏️ Düzenle</button>
      </div>
    </div>
  `).join('');
}

function openEdit(id) {
  editId = id;
  const m = get().find(x => x.id === id);
  if (!m) return;
  document.getElementById('sheetTitle').textContent = 'Model Düzenle';
  document.getElementById('f-name').value = m.name;
  document.getElementById('f-price').value = m.price;
  document.getElementById('f-img').value = m.img;
  document.getElementById('delLink').style.display = 'block';
  document.getElementById('editOverlay').classList.add('open');
}

function openAdd() {
  editId = null;
  document.getElementById('sheetTitle').textContent = 'Yeni Model Ekle';
  document.getElementById('f-name').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-img').value = '';
  document.getElementById('delLink').style.display = 'none';
  document.getElementById('editOverlay').classList.add('open');
}

function closeEdit() { document.getElementById('editOverlay').classList.remove('open'); }

function saveModel() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Model adı zorunludur.'); return; }
  const entry = {
    name,
    price: parseInt(document.getElementById('f-price').value) || 0,
    img: document.getElementById('f-img').value.trim(),
  };
  const ms = get();
  if (editId) {
    const idx = ms.findIndex(m => m.id === editId);
    if (idx > -1) ms[idx] = { ...ms[idx], ...entry };
  } else {
    entry.id = Date.now();
    ms.push(entry);
  }
  sv(ms); closeEdit(); render();
}

function deleteModel() {
  if (!confirm('Bu modeli silmek istediğinizden emin misiniz?')) return;
  sv(get().filter(m => m.id !== editId));
  closeEdit(); render();
}

function openPass() {
  if (admin) { admin = false; applyAdmin(); return; }
  document.getElementById('passIn').value = '';
  document.getElementById('passErr').textContent = '';
  document.getElementById('passModal').classList.add('open');
  setTimeout(() => document.getElementById('passIn').focus(), 100);
}
function closePass() { document.getElementById('passModal').classList.remove('open'); }
function checkPass() {
  if (document.getElementById('passIn').value === '1234') {
    admin = true; closePass(); applyAdmin();
  } else {
    document.getElementById('passErr').textContent = 'Yanlış şifre!';
  }
}
function applyAdmin() {
  document.getElementById('adminBar').style.display = admin ? 'block' : 'none';
  document.getElementById('lockBtn').textContent = admin ? '🔓 Çıkış' : '🔒 Yönetici';
  document.getElementById('addBtn').style.display = admin ? 'block' : 'none';
  render();
}

document.getElementById('editOverlay').addEventListener('click', function(e) { if (e.target === this) closeEdit(); });
document.getElementById('passModal').addEventListener('click', function(e) { if (e.target === this) closePass(); });

render();
</script>
</body>
</html>
