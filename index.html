<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{font-family:sans-serif;background:#f2f2f2}

header{
  background:#2c2c2c;
  color:#fff;
  padding:20px;
  text-align:center;
  position:sticky;
  top:0;
}

.list{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  padding-bottom:120px;
}

@media(max-width:600px){
  .list{grid-template-columns:1fr;}
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
}

.card-info{
  padding:12px;
  display:flex;
  justify-content:space-between;
}

#lockBtn,#addBtn{
  position:fixed;
  bottom:20px;
  padding:12px 18px;
  border:none;
  border-radius:30px;
  color:#fff;
}

#lockBtn{right:20px;background:#333}
#addBtn{left:20px;background:green;display:none}

#colSelect{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px;
  border-radius:20px;
}
.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:flex-end;
}
.overlay.open{display:flex}
.sheet{
  background:#fff;
  width:100%;
  max-width:500px;
  padding:20px;
  border-radius:20px 20px 0 0;
}
.sheet input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>KATALOG</header>

<div class="list" id="list"></div>

<button id="lockBtn" onclick="openPass()">Admin</button>
<button id="addBtn" onclick="openAdd()">Ekle</button>

<select id="colSelect" onchange="setColumns()">
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4" selected>4</option>
</select>

<div class="overlay" id="editOverlay">
  <div class="sheet">
    <input id="name" placeholder="Ad">
    <input id="price" placeholder="Fiyat">
    <input id="img" placeholder="Resim">

    <button onclick="save()">Kaydet</button>
    <p onclick="del()" style="color:red;cursor:pointer">Sil</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
apiKey:"AIzaSyD6TKF0EJbmJtl9jVNKS-Lz24weFjYKGeE",
authDomain:"ramazan-mermer.firebaseapp.com",
databaseURL:"https://ramazan-mermer-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"ramazan-mermer"
});

const db=getDatabase(app);

let editId=null;
let isAdmin=false;

const list=document.getElementById("list");
const modal=document.getElementById("editOverlay");

const nameEl=document.getElementById("name");
const priceEl=document.getElementById("price");
const imgEl=document.getElementById("img");

/* RENDER */
onValue(ref(db,"models"),snap=>{
list.innerHTML="";
const data=snap.val();
if(!data) return;

Object.entries(data).forEach(([id,item])=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${item.img}">
<div class="card-info">
<div>${item.name}</div>
<div>${item.price}₺</div>
</div>
`;
if(isAdmin) div.onclick=()=>edit(id,item);
list.appendChild(div);
});
});

/* ADMIN */
window.openPass=async()=>{
const pass=prompt("Şifre");
const snap=await get(ref(db,"adminPass"));

if(pass==snap.val()){
isAdmin=true;
addBtn.style.display="block";
lockBtn.style.display="none";
}
};

window.openAdd=()=>{
editId=null;
nameEl.value="";
priceEl.value="";
imgEl.value="";
modal.classList.add("open");
};

window.edit=(id,item)=>{
editId=id;
nameEl.value=item.name;
priceEl.value=item.price;
imgEl.value=item.img;
modal.classList.add("open");
};

window.save=()=>{
if(editId){
set(ref(db,"models/"+editId),{
name:nameEl.value,
price:priceEl.value,
img:imgEl.value
});
}else{
push(ref(db,"models"),{
name:nameEl.value,
price:priceEl.value,
img:imgEl.value
});
}
modal.classList.remove("open");
};

window.del=()=>{
remove(ref(db,"models/"+editId));
modal.classList.remove("open");
};

window.setColumns=()=>{
const v=document.getElementById("colSelect").value;
list.style.gridTemplateColumns=`repeat(${v},1fr)`;
};
</script>

</body>
</html>
