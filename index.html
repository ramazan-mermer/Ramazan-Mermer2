<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramazan Mermer</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f2f2f2}

/* HEADER */
header{
  background:#2c2c2c;
  color:#fff;
  padding:12px;
  text-align:center;
  position:sticky;
  top:0;
  cursor:pointer;
  z-index:10;
}

.header-content{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.logo{height:45px}

/* Admin modu banner */
#adminBanner{
  display:none;
  background:#e65c00;
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:13px;
  font-weight:bold;
  letter-spacing:0.5px;
}

.section-title{
  padding:15px;
  font-weight:bold;
  font-size:18px;
}

/* sıralama */
.sort-bar{
  padding:0 15px 10px;
}

.sort-bar select{
  width:100%;
  padding:8px;
  border-radius:8px;
}

/* liste */
.list{
  padding:15px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
  padding-bottom:120px;
}

.card{
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:relative;
}

/* Admin modunda kart üzerinde düzenle işareti */
.card.admin-mode{
  cursor:pointer;
}

.card.admin-mode::after{
  content:"✏️ Düzenle";
  position:absolute;
  top:8px;
  left:8px;
  background:rgba(230,92,0,0.9);
  color:#fff;
  font-size:11px;
  font-weight:bold;
  padding:3px 8px;
  border-radius:20px;
  pointer-events:none;
}

.card img{
  width:100%;
  aspect-ratio:9/16;
  object-fit:cover;
}

.card-info{padding:10px}

.name-price{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

.wp-item{
  background:#25D366;
  color:#fff;
  border:none;
  width:100%;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
}

/* NABIZLI ARAMA */
#callBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border:none;
  border-radius:50%;
  cursor:pointer;
  background:#ff3b3b;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 0 rgba(255,59,59,0.6);
  animation:pulse 1.8s infinite;
}

#callBtn img{width:28px}

@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(255,59,59,0.6);}
  70%{box-shadow:0 0 0 15px rgba(255,59,59,0);}
  100%{box-shadow:0 0 0 0 rgba(255,59,59,0);}
}

/* viewer */
#viewer{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:100;
}

#viewer img{
  max-width:95%;
  max-height:95%;
}

/* MODAL ORTAK */
.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:200;
}

.modal-box{
  background:#fff;
  padding:20px;
  border-radius:12px;
  width:320px;
  max-height:90vh;
  overflow-y:auto;
}

.modal-box h3{
  margin-bottom:12px;
  font-size:16px;
  color:#2c2c2c;
}

.modal-box input{
  width:100%;
  margin:5px 0;
  padding:9px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
}

.modal-box .btn-group{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.modal-box button{
  flex:1;
  padding:9px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  font-weight:bold;
}

.btn-green{background:#25D366;color:#fff;}
.btn-orange{background:#e65c00;color:#fff;}
.btn-red{background:#ff3b3b;color:#fff;}
.btn-gray{background:#ccc;color:#000;}

/* FACEBOOK BANNER */
#fbBanner{
  margin:12px 15px;
  background:linear-gradient(135deg,#1877F2 0%,#0a5abf 100%);
  border-radius:14px;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:13px;
  cursor:pointer;
  text-decoration:none;
  box-shadow:0 3px 12px rgba(24,119,242,0.35);
  transition:transform 0.15s, box-shadow 0.15s;
}

#fbBanner:active{
  transform:scale(0.97);
  box-shadow:0 1px 6px rgba(24,119,242,0.25);
}

.fb-icon{
  width:38px;
  height:38px;
  background:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.fb-icon img{
  width:24px;
  height:24px;
}

.fb-text{
  flex:1;
}

.fb-text .fb-title{
  color:#fff;
  font-weight:bold;
  font-size:14px;
  line-height:1.3;
}

.fb-text .fb-sub{
  color:rgba(255,255,255,0.82);
  font-size:12px;
  margin-top:2px;
}

.fb-arrow{
  color:rgba(255,255,255,0.7);
  font-size:18px;
}

/* Admin buton barı */
#adminActionBar{
  display:none;
  padding:10px 15px;
  background:#fff8f4;
  border-bottom:1px solid #ffd5b8;
}

#adminActionBar button{
  width:100%;
  padding:10px;
  background:#e65c00;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<header onclick="secretClick()">
  <div class="header-content">
    <img src="logo.png" class="logo">
    <h2>Ramazan Mermer</h2>
  </div>
</header>

<!-- Admin modu aktifken göster -->
<div id="adminBanner">🔧 ADMİN MODU AKTİF — Çıkmak için başlığa 5 kez tıkla</div>

<!-- Admin: Yeni ürün ekle butonu -->
<div id="adminActionBar">
  <button onclick="openAddModal()">+ Yeni Ürün Ekle</button>
</div>

<!-- FACEBOOK BANNER -->
<a id="fbBanner" href="https://www.facebook.com/karabuktesafranboludamermerciimezarciramazansonmez" target="_blank">
  <div class="fb-icon">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="#1877F2">
      <path d="M24 12.073C24 5.404 18.627 0 12 0S0 5.404 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.884v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
    </svg>
  </div>
  <div class="fb-text">
    <div class="fb-title">Gerçekleştirilen Çalışmalarımız</div>
    <div class="fb-sub">Facebook sayfamızdan güncel mezar fotoğraflarını inceleyebilirsiniz</div>
  </div>
  <div class="fb-arrow">›</div>
</a>

<div class="section-title">Mezar Modellerimiz:</div>

<div class="sort-bar">
  <select id="sortSelect">
    <option value="default">Sıralama</option>
    <option value="asc">Artan - Azalan</option>
    <option value="desc">Azalan - Artan</option>
  </select>
</div>

<div class="list" id="list"></div>

<!-- ARAMA -->
<button id="callBtn" onclick="callPhone()">
  <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png">
</button>

<!-- viewer -->
<div id="viewer" onclick="closeViewer()">
  <img id="viewerImg">
</div>

<!-- 1. ADMIN GİRİŞ MODALI -->
<div class="modal" id="adminPanel">
  <div class="modal-box">
    <h3>🔐 Admin Girişi</h3>
    <input type="password" id="pass" placeholder="Şifre">
    <div class="btn-group">
      <button class="btn-green" onclick="login()">Giriş</button>
      <button class="btn-gray" onclick="closeAdmin()">İptal</button>
    </div>
  </div>
</div>

<!-- 2. YENİ ÜRÜN EKLE MODALI -->
<div class="modal" id="addModal">
  <div class="modal-box">
    <h3>➕ Yeni Ürün Ekle</h3>
    <input id="add_name" placeholder="Model adı">
    <input id="add_price" placeholder="Fiyat (₺)" type="number">
    <input id="add_img" placeholder="Resim URL">
    <div class="btn-group">
      <button class="btn-orange" onclick="addProduct()">Ekle</button>
      <button class="btn-gray" onclick="closeModal('addModal')">İptal</button>
    </div>
  </div>
</div>

<!-- 3. ÜRÜN DÜZENLE MODALI -->
<div class="modal" id="editModal">
  <div class="modal-box">
    <h3>✏️ Ürünü Düzenle</h3>
    <input id="edit_name" placeholder="Model adı">
    <input id="edit_price" placeholder="Fiyat (₺)" type="number">
    <input id="edit_img" placeholder="Resim URL">
    <div class="btn-group">
      <button class="btn-orange" onclick="saveEdit()">Kaydet</button>
      <button class="btn-gray" onclick="closeModal('editModal')">İptal</button>
    </div>
    <div class="btn-group" style="margin-top:8px;">
      <button class="btn-red" onclick="deleteProduct()">🗑️ Sil</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, set, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyD6TKF0EJbmJtl9jVNKS-Lz24weFjYKGeE",
  authDomain:"ramazan-mermer.firebaseapp.com",
  databaseURL:"https://ramazan-mermer-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"ramazan-mermer"
});

const db = getDatabase(app);
const listEl = document.getElementById("list");
const sortSelect = document.getElementById("sortSelect");

let modelsData = [];
let isAdmin = false;
let editingId = null;

/* VERİ */
onValue(ref(db,"models"), snap => {
  const data = snap.val();
  if(!data) return;
  modelsData = Object.entries(data).map(([id,item]) => ({ id, ...item }));
  render();
});

/* RENDER */
function render(){
  listEl.innerHTML = "";
  let sorted = [...modelsData];

  if(sortSelect.value === "asc") sorted.sort((a,b) => a.price - b.price);
  if(sortSelect.value === "desc") sorted.sort((a,b) => b.price - a.price);

  sorted.forEach(item => {
    const link = window.location.href + "#model-" + item.id;
    const div = document.createElement("div");
    div.className = "card" + (isAdmin ? " admin-mode" : "");

    div.innerHTML = `
      <img src="${item.img}" onclick="handleImgClick(event,'${item.img}','${item.id}')">
      <div class="card-info">
        <div class="name-price">
          <div>${item.name}</div>
          <div>${item.price}₺</div>
        </div>
        <button class="wp-item" onclick="sendWhatsApp(event,'${item.name}','${link}')">
          WhatsApp'tan sor
        </button>
      </div>
    `;

    // Admin modunda karta tıklayınca düzenle
    if(isAdmin){
      div.addEventListener("click", (e) => {
        // WhatsApp butonuna tıklamayı engelleme
        if(e.target.classList.contains("wp-item")) return;
        openEditModal(item);
      });
    }

    listEl.appendChild(div);
  });
}

sortSelect.addEventListener("change", render);

/* FOTO */
window.handleImgClick = (e, src, id) => {
  if(isAdmin){
    // Admin modunda resme tıklayınca düzenleme açılır (kart click'i handle eder)
    return;
  }
  e.stopPropagation();
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("viewerImg").src = src;
};

window.closeViewer = () => {
  document.getElementById("viewer").style.display = "none";
};

/* WHATSAPP */
window.sendWhatsApp = (e, name, link) => {
  e.stopPropagation();
  if(isAdmin) return; // admin modunda WA açılmasın
  const msg = `Merhaba, ${name} modeli hakkında bilgi almak istiyorum.\nÜrün linki: ${link}`;
  window.open("https://wa.me/905423189711?text=" + encodeURIComponent(msg), "_blank");
};

/* TELEFON */
window.callPhone = () => {
  window.location.href = "tel:+905423189711";
};

/* GİZLİ ADMIN */
let clickCount = 0;
let timer;

window.secretClick = () => {
  // Zaten admin ise çıkış yap
  if(isAdmin){
    clickCount++;
    clearTimeout(timer);
    timer = setTimeout(() => clickCount = 0, 1500);
    if(clickCount === 5){
      logoutAdmin();
      clickCount = 0;
    }
    return;
  }

  clickCount++;
  clearTimeout(timer);
  timer = setTimeout(() => clickCount = 0, 1500);

  if(clickCount === 5){
    document.getElementById("adminPanel").style.display = "flex";
    clickCount = 0;
  }
};

/* GİRİŞ */
window.login = () => {
  const pass = document.getElementById("pass").value;
  if(pass === "1234"){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("adminBanner").style.display = "block";
    document.getElementById("adminActionBar").style.display = "block";
    document.getElementById("pass").value = "";
    render();
  } else {
    alert("Hatalı şifre");
  }
};

function logoutAdmin(){
  isAdmin = false;
  document.getElementById("adminBanner").style.display = "none";
  document.getElementById("adminActionBar").style.display = "none";
  render();
}

window.closeAdmin = () => {
  document.getElementById("adminPanel").style.display = "none";
  document.getElementById("pass").value = "";
};

/* MODAL KAPAT */
window.closeModal = (id) => {
  document.getElementById(id).style.display = "none";
};

/* YENİ ÜRÜN EKLE */
window.openAddModal = () => {
  document.getElementById("add_name").value = "";
  document.getElementById("add_price").value = "";
  document.getElementById("add_img").value = "";
  document.getElementById("addModal").style.display = "flex";
};

window.addProduct = () => {
  const name  = document.getElementById("add_name").value.trim();
  const price = parseInt(document.getElementById("add_price").value);
  const img   = document.getElementById("add_img").value.trim();

  if(!name || !price || !img){ alert("Tüm alanları doldur"); return; }

  set(push(ref(db,"models")), { name, price, img });
  document.getElementById("addModal").style.display = "none";
  alert("Ürün eklendi ✅");
};

/* ÜRÜN DÜZENLE */
window.openEditModal = (item) => {
  editingId = item.id;
  document.getElementById("edit_name").value  = item.name;
  document.getElementById("edit_price").value = item.price;
  document.getElementById("edit_img").value   = item.img;
  document.getElementById("editModal").style.display = "flex";
};

window.saveEdit = () => {
  if(!editingId) return;
  const name  = document.getElementById("edit_name").value.trim();
  const price = parseInt(document.getElementById("edit_price").value);
  const img   = document.getElementById("edit_img").value.trim();

  if(!name || !price || !img){ alert("Tüm alanları doldur"); return; }

  update(ref(db, "models/" + editingId), { name, price, img });
  document.getElementById("editModal").style.display = "none";
  editingId = null;
  alert("Kaydedildi ✅");
};

window.deleteProduct = () => {
  if(!editingId) return;
  if(!confirm("Bu ürünü silmek istediğinden emin misin?")) return;
  remove(ref(db, "models/" + editingId));
  document.getElementById("editModal").style.display = "none";
  editingId = null;
};
</script>

</body>
</html>
