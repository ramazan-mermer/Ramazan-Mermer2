<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezar Kataloğu</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f2f2;
}

/* LİSTE ALANI */
.list {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  padding: 15px;
}

/* KART */
.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.card-info {
  padding: 10px;
}

/* BUTON / SELECT */
#colSelect {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: #333;
  color: white;
  font-weight: bold;
}

/* MOBİL */
@media (max-width: 600px) {
  .list {
    grid-template-columns: repeat(1, 1fr);
  }
}
</style>
</head>

<body>

<!-- LİSTE -->
<div class="list" id="list">

  <div class="card">
    <img src="https://picsum.photos/300/200?1">
    <div class="card-info">Mezar 1</div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/200?2">
    <div class="card-info">Mezar 2</div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/200?3">
    <div class="card-info">Mezar 3</div>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/200?4">
    <div class="card-info">Mezar 4</div>
  </div>

</div>

<!-- GÖRÜNÜM SEÇ -->
<select id="colSelect" onchange="setColumns()">
  <option value="1">Tekli Görünüm</option>
  <option value="2">İkili Görünüm</option>
  <option value="3">Üçlü Görünüm</option>
  <option value="4" selected>Dörtlü Görünüm</option>
</select>

<script>
function setColumns() {
  const val = document.getElementById("colSelect").value;
  const list = document.getElementById("list");

  list.style.gridTemplateColumns = `repeat(${val}, 1fr)`;
}
</script>

</body>
</html>
